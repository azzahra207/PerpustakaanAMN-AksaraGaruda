<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan QR Absensi Petugas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary: #ee4343;
            --primary-dark: #a30c0c;
            --primary-light: #f5a3a3;
            --success: #06d6a0;
            --danger: #ef476f;
            --warning: #f9c74f;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray: #8d99ae;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .scanner-wrapper {
            max-width: 550px;
            width: 100%;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-title {
            text-align: center;
            color: var(--primary-dark);
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            letter-spacing: -0.5px;
        }

        .page-title i {
            margin-right: 10px;
        }

        .scanner-card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .scanner-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
        }

        .card-header-custom {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 1.75rem;
            text-align: center;
        }

        .card-header-custom i {
            font-size: 3rem;
            color: white;
            margin-bottom: 0.5rem;
        }

        .card-header-custom h4 {
            color: white;
            margin: 0;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .card-header-custom p {
            color: rgba(255,255,255,0.9);
            margin: 0.5rem 0 0;
            font-size: 0.85rem;
        }

        .card-body-custom {
            padding: 2rem;
        }

        /* Scanner Reader */
        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #reader video {
            border-radius: 20px;
            width: 100%;
        }

        /* Result Alert */
        .result-alert {
            border-radius: 16px;
            padding: 1rem;
            margin-top: 1.5rem;
            animation: slideIn 0.3s ease-out;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success-custom {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            border-left: 4px solid var(--success);
            color: #155724;
        }

        .alert-danger-custom {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            border-left: 4px solid var(--danger);
            color: #721c24;
        }

        .alert-info-custom {
            background: linear-gradient(135deg, #d1ecf1, #bee5eb);
            border-left: 4px solid var(--primary);
            color: #0c5460;
        }

        /* Button */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s ease;
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            text-decoration: none;
            margin-top: 1.5rem;
        }

        .btn-back:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        /* Loading indicator */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 576px) {
            body {
                padding: 1rem;
            }
            
            .page-title {
                font-size: 1.3rem;
            }
            
            .card-body-custom {
                padding: 1.5rem;
            }
            
            .card-header-custom h4 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

<div class="scanner-wrapper">
    <h1 class="page-title">
        <i class="fas fa-qrcode"></i> Scan QR Absensi
    </h1>
    
    <div class="scanner-card">
        <div class="card-header-custom">
            <i class="fas fa-fingerprint"></i>
            <h4>Absen Petugas Perpustakaan</h4>
            <p>Arahkan kamera ke QR Code absensi</p>
        </div>
        
        <div class="card-body-custom">
            <div id="reader"></div>
            <div id="scan-result" class="mt-3"></div>
            
            <div class="text-center">
                <a href="{% url 'dashboard' %}" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

<script>
let scanner;

function showResult(message, success = true, isInfo = false) {
    const resultDiv = document.getElementById('scan-result');
    
    if (isInfo) {
        resultDiv.innerHTML = `
            <div class="result-alert alert-info-custom">
                <i class="fas fa-spinner fa-pulse"></i>
                <span>${message}</span>
            </div>`;
    } else if (success) {
        resultDiv.innerHTML = `
            <div class="result-alert alert-success-custom">
                <i class="fas fa-check-circle"></i>
                <span>${message}</span>
            </div>`;
    } else {
        resultDiv.innerHTML = `
            <div class="result-alert alert-danger-custom">
                <i class="fas fa-times-circle"></i>
                <span>${message}</span>
            </div>`;
    }
}

function isMobile() {
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function startScanner() {
    scanner = new Html5Qrcode("reader");

    const facingMode = isMobile() ? "environment" : "user";

    scanner.start(
        { facingMode: facingMode },
        {
            fps: 10,
            qrbox: 300
        },
        (decodedText) => {
            console.log("QR:", decodedText);

            scanner.stop();

            showResult("Memproses data...", true, true);

            processQRCode(decodedText);
        },
        (errorMessage) => {
            // ignore error kecil
        }
    ).catch(err => {
        console.error("Error:", err);
        showResult("Tidak bisa mengakses kamera. Pastikan izin kamera diberikan.", false);
    });
}

function processQRCode(qrCode) {
    fetch("{% url 'petugas.absensi' %}", {
        method: "POST",
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({
            qr_code: qrCode
        })
    })
    .then(res => {
        console.log("STATUS:", res.status);
        return res.text();
    })
    .then(text => {
        console.log("RAW RESPONSE:", text);

        let data;
        try {
            data = JSON.parse(text);
        } catch (e) {
            throw new Error("Response bukan JSON");
        }

        if (data.success) {
            showResult(data.message, true);
        } else {
            showResult(data.message, false);
        }

        setTimeout(() => startScanner(), 2000);
    })
    .catch(error => {
        console.error("Fetch error:", error);
        showResult("Terjadi kesalahan koneksi. Silakan coba lagi.", false);
        setTimeout(() => startScanner(), 2000);
    });
}

document.addEventListener('DOMContentLoaded', () => {
    startScanner();
});
</script>

</body>
</html>
