{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
     .tombol-second {
    background: linear-gradient(150rad, #ffffff, rgb(226, 226, 226), #c0bfbf);
    padding: 10px 20px !important;
    border: none;
    text-decoration: none;
    border-radius: 50px !important;
    transform: scale(1) !important;
    transition: 0.3s !important;
}

.tombol-second:hover {
    background: linear-gradient(150rad, #d3d2d2, #cfcdcd, #f1f1f1);
    transform: scale(1.05) !important;
}
</style>
<div class="container mt-5 pt-4">
    <div class="row justify-content-center" >
        <div class="col-md-8" >
            <div class="card shadow-lg border-0 rounded-4 my-5" >
                <div class="card-body p-4">
                    <h3 class="fw-bold text-center" style="font-size: 30px;">Registrasi Tamu</h3>
                    <div class="rounded-3 mb-5 mx-auto" style="width: 120px; border: solid #a01313 3px;"></div> 

                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nama Depan <span class="text-danger">*</span></label>
                                <input type="text" name="first_name" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nama Belakang</label>
                                <input type="text" name="last_name" class="form-control">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">NIK <span class="text-danger">*</span></label>
                                <input type="text" name="nik" class="form-control" required>
                                <small class="text-muted">Nomor Identitas Kependudukan</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">No HP <span class="text-danger">*</span></label>
                                <input type="text" name="no_hp" class="form-control" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Instansi <span class="text-danger">*</span></label>
                                <input type="text" name="instansi" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Jabatan <span class="text-danger">*</span></label>
                                <input type="text" name="jabatan" class="form-control" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Alamat <span class="text-danger">*</span></label>
                                <input type="text" name="alamat" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Tujuan Kunjungan <span class="text-danger">*</span></label>
                                <input type="text" name="tujuan" class="form-control" required>
                                <small class="text-muted">Contoh: Penelitian, Studi Banding, dll</small>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Foto</label>
                            <input type="file" name="foto" class="form-control" accept="image/*">
                            <small class="text-muted">Kosongkan untuk menggunakan foto default</small>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a class="btn btn-light tombol-second text-decoration-none fw-bold mt-3 py-0 align-items-center" href="{% url 'daftar.tamu' %}">
                                &larr; Data Tamu 
                            </a>
                            <button type="submit" class="btn tombol-hijau">
                                <i class="fas fa-save me-2 text-light fs-5 my-2"></i>Simpan
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
