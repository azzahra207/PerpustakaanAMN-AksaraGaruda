{% extends 'base.html' %}
{% block content %}
<style>
    :root {
        --primary: #ee4343;
        --primary-dark: #a30c0c;
        --primary-light: #f5a3a3;
        --success: #06d6a0;
        --danger: #ef476f;
        --warning: #f9c74f;
        --dark: #2b2d42;
        --light: #f8f9fa;
        --gray: #8d99ae;
    }

    body {
        font-family: 'Poppins', 'Segoe UI', sans-serif;
    }

    .scanner-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .scanner-wrapper {
        max-width: 550px;
        width: 100%;
        animation: fadeInUp 0.8s ease-out;
        margin-top: 50px;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .page-title {
        text-align: center;
        color: var(--primary-dark);
        font-weight: 800;
        font-size: 2rem;
        margin-bottom: 2rem;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        letter-spacing: -0.5px;
    }

    .scanner-card {
        background: white;
        border-radius: 28px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .scanner-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 30px 60px rgba(0,0,0,0.25);
    }

    .card-header-custom {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        padding: 1.75rem;
        text-align: center;
    }

    .card-header-custom i {
        font-size: 3.5rem;
        color: white;
        margin-bottom: 0.5rem;
    }

    .card-header-custom h3 {
        color: white;
        margin: 0;
        font-weight: 700;
        font-size: 1.5rem;
    }

    .card-header-custom p {
        color: rgba(255,255,255,0.9);
        margin: 0.5rem 0 0;
        font-size: 0.85rem;
    }

    .card-body-custom {
        padding: 2rem;
    }

    /* Status Indicator */
    .status-container {
        background: #f8f9fa;
        border-radius: 16px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid #e9ecef;
    }

    .status-indicator {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        display: inline-block;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }

    .status-ready {
        background-color: var(--success);
        box-shadow: 0 0 8px var(--success);
    }
    .status-waiting {
        background-color: var(--warning);
        box-shadow: 0 0 8px var(--warning);
    }
    .status-error {
        background-color: var(--danger);
        box-shadow: 0 0 8px var(--danger);
    }

    .status-text {
        font-weight: 500;
        color: var(--dark);
        font-size: 0.9rem;
    }

    /* Scanner Input */
    .scanner-input-group {
        margin-bottom: 1.5rem;
    }

    .scanner-input-group label {
        font-weight: 600;
        color: var(--dark);
        margin-bottom: 0.5rem;
        display: block;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .scanner-input {
        width: 100%;
        padding: 1rem 1.25rem;
        font-size: 1rem;
        text-align: center;
        letter-spacing: 2px;
        border: 2px solid #e9ecef;
        border-radius: 16px;
        transition: all 0.3s ease;
        background: #f8f9fa;
        font-family: monospace;
        font-weight: 600;
    }

    .scanner-input:focus {
        outline: none;
        border-color: var(--primary);
        background: white;
        box-shadow: 0 0 0 4px rgba(238, 67, 67, 0.1);
    }

    .form-hint {
        font-size: 0.75rem;
        color: var(--gray);
        margin-top: 0.5rem;
        text-align: center;
    }

    .form-hint i {
        margin-right: 4px;
    }

    /* Result Alert */
    .result-alert {
        border-radius: 16px;
        padding: 1rem;
        margin-top: 1rem;
        animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .alert-success-custom {
        background: linear-gradient(135deg, #d4edda, #c3e6cb);
        border-left: 4px solid var(--success);
        color: #155724;
    }

    .alert-danger-custom {
        background: linear-gradient(135deg, #f8d7da, #f5c6cb);
        border-left: 4px solid var(--danger);
        color: #721c24;
    }

    /* Button Group */
    .button-group {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        margin-top: 1.5rem;
    }

    .btn-custom {
        padding: 0.75rem 1.5rem;
        border-radius: 40px;
        font-weight: 600;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: none;
        cursor: pointer;
    }

    .btn-danger-custom {
        background: white;
        color: var(--danger);
        border: 2px solid var(--danger);
    }

    .btn-danger-custom:hover {
        background: var(--danger);
        color: white;
        transform: translateY(-2px);
    }

    .btn-primary-custom {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white;
        border: none;
    }

    .btn-primary-custom:hover {
        background: linear-gradient(135deg, var(--primary-dark), var(--primary));
        transform: translateY(-2px);
        box-shadow: 0 6px 14px rgba(238, 67, 67, 0.3);
    }

    @media (max-width: 576px) {
        .scanner-page {
            padding: 1rem;
        }
        
        .page-title {
            font-size: 1.5rem;
        }
        
        .card-body-custom {
            padding: 1.5rem;
        }
        
        .button-group {
            flex-direction: column;
        }
        
        .btn-custom {
            justify-content: center;
        }
        
        .scanner-input {
            font-size: 0.85rem;
            padding: 0.75rem 1rem;
        }
    }
</style>

<section class="scanner-page">
    <div class="scanner-wrapper">
        <h1 class="page-title">
            <i class="fas fa-qrcode"></i> Scanner Hardware
        </h1>
        
        <div class="scanner-card">
            <div class="card-header-custom">
                <i class="fas fa-fingerprint"></i>
                <h3>Pinjam / Kembalikan Buku</h3>
                <p>Arahkan scanner ke QR Code buku</p>
            </div>
            
            <div class="card-body-custom">
                <div class="status-container">
                    <span class="status-indicator status-ready" id="statusIndicator"></span>
                    <span class="status-text" id="statusText">Scanner siap - Scan QR Code</span>
                </div>

                <div class="scanner-input-group">
                    <label>QR CODE SCANNER</label>
                    <input type="text" 
                           class="scanner-input" 
                           id="scannerInput"
                           autocomplete="off"
                           autocorrect="off"
                           autocapitalize="off"
                           spellcheck="false"
                           placeholder="Menunggu scan...">
                    <div class="form-hint">
                        <i class="fas fa-bluetooth-b"></i> Arahkan scanner hardware ke QR Code
                    </div>
                </div>

                <div id="scanResult"></div>

                <div class="button-group">
                    <button onclick="clearScanner()" class="btn-custom btn-danger-custom">
                        <i class="fas fa-trash-alt"></i> Hapus
                    </button>
                    <a href="{% url 'login.options' %}" class="btn-custom btn-primary-custom">
                        <i class="fas fa-arrow-left"></i> Kembali
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    let isProcessing = false;
    let lastValue = '';
    let processTimeout = null;
    
    const scannerInput = document.getElementById('scannerInput');
    const scanResult = document.getElementById('scanResult');
    const statusIndicator = document.getElementById('statusIndicator');
    const statusText = document.getElementById('statusText');
    
    function updateStatus(status, text) {
        statusIndicator.className = 'status-indicator status-' + status;
        statusText.textContent = text;
    }
    
    function resetScanner() {
        scannerInput.value = '';
        lastValue = '';
        if (processTimeout) clearTimeout(processTimeout);
        scanResult.innerHTML = '';
        updateStatus('ready', 'Scanner siap - Scan QR Code');
        isProcessing = false;
        scannerInput.focus();
    }
    
    function processScanData(scannedData) {
        if (isProcessing) return;
        let cleanData = scannedData.trim();
        cleanData = cleanData.replace(/[^\x20-\x7E|]/g, '');
        
        console.log('Processing data:', cleanData);
        
        if (!cleanData.includes('|')) {
            updateStatus('error', 'Format QR tidak valid');
            scanResult.innerHTML = `
                <div class="result-alert alert-danger-custom">
                    <i class="fas fa-exclamation-triangle"></i> 
                    <strong>Format QR tidak valid!</strong><br>
                    QR Code harus mengandung format yang benar.
                </div>`;
            setTimeout(() => resetScanner(), 2000);
            return;
        }
        
        isProcessing = true;
        updateStatus('waiting', 'Memproses QR Code...');
        
        fetch("{% url 'buku.scanner' %}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({
                qr_code: cleanData
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                updateStatus('ready', 'berhasil!');
                scanResult.innerHTML = `
                    <div class="result-alert alert-success-custom">
                        <i class="fas fa-check-circle"></i> 
                        <strong>Berhasil!</strong><br>
                        ${data.message}
                    </div>`;
                setTimeout(() => {
                    resetScanner();
                    isProcessing = false;
                }, 2000);
            } else {
                updateStatus('error', 'Gagal');
                scanResult.innerHTML = `
                    <div class="result-alert alert-danger-custom">
                        <i class="fas fa-times-circle"></i> 
                        <strong>Gagal!</strong><br>
                        ${data.message}
                    </div>`;
                setTimeout(() => {
                    resetScanner();
                    isProcessing = false;
                }, 3000);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            updateStatus('error', 'Error jaringan');
            scanResult.innerHTML = `
                <div class="result-alert alert-danger-custom">
                    <i class="fas fa-wifi"></i> 
                    <strong>Kesalahan Jaringan!</strong><br>
                    Periksa koneksi internet Anda.
                </div>`;
            setTimeout(() => {
                resetScanner();
                isProcessing = false;
            }, 3000);
        });
    }
    
    setInterval(function() {
        if (isProcessing) return;
        
        const currentValue = scannerInput.value;
        
        if (currentValue !== lastValue) {
            lastValue = currentValue;
            
            if (processTimeout) clearTimeout(processTimeout);
            
            processTimeout = setTimeout(function() {
                if (currentValue.length > 0 && currentValue.includes('|')) {
                    console.log('Detected complete data:', currentValue);
                    processScanData(currentValue);
                    scannerInput.value = '';
                    lastValue = '';
                }
            }, 200);
        }
    }, 50);
    
    scannerInput.addEventListener('input', function(e) {
        if (isProcessing) return;
        
        const value = e.target.value;
        
        if (processTimeout) clearTimeout(processTimeout);
        
        if (value.includes('|') && value.length > 20) {
            processTimeout = setTimeout(function() {
                processScanData(value);
                scannerInput.value = '';
                lastValue = '';
            }, 100);
        }
    });
    
    scannerInput.addEventListener('paste', function(e) {
        e.preventDefault();
        const pastedData = e.clipboardData.getData('text');
        if (pastedData) {
            processScanData(pastedData);
            scannerInput.value = '';
        }
    });
    
    function clearScanner() {
        resetScanner();
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        scannerInput.focus();
        updateStatus('ready', 'Scanner siap - Scan QR Code');
    });
    
    scannerInput.addEventListener('blur', function() {
        setTimeout(() => scannerInput.focus(), 100);
    });
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}
