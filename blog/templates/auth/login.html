{% extends 'base.html' %}
{% block content %}
{% load static %}

<style>
    :root {
        --primary: #ee4343;
        --primary-dark: #a30c0c;
        --primary-light: #fef2f2;
        --success: #06d6a0;
        --dark: #1e293b;
        --gray: #64748b;
        --gray-light: #f8fafc;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-attachment: fixed;
        font-family: 'Poppins', 'Segoe UI', sans-serif;
    }

    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .login-wrapper {
        max-width: 500px;
        width: 100%;
        animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .login-card {
        background: white;
        border-radius: 32px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        transition: transform 0.3s ease;
    }

    .login-card:hover {
        transform: translateY(-5px);
    }

    .card-header-custom {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        padding: 2rem;
        text-align: center;
    }

    .card-header-custom img {
        max-width: 250px;
        margin-bottom: 1rem;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }

    .card-header-custom h3 {
        color: white;
        font-weight: 700;
        font-size: 1.5rem;
        margin: 0;
    }

    .card-header-custom p {
        color: rgba(255,255,255,0.9);
        margin: 0.5rem 0 0;
        font-size: 0.85rem;
    }

    .card-body-custom {
        padding: 2rem;
    }

    /* Form Group */
    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        font-weight: 600;
        color: var(--dark);
        margin-bottom: 0.5rem;
        display: block;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .form-group label i {
        margin-right: 8px;
        color: var(--primary);
    }

    .form-control-custom {
        width: 100%;
        padding: 0.9rem 1.25rem;
        font-size: 1rem;
        border: 2px solid #e2e8f0;
        border-radius: 16px;
        transition: all 0.3s ease;
        background: var(--gray-light);
    }

    .form-control-custom:focus {
        outline: none;
        border-color: var(--primary);
        background: white;
        box-shadow: 0 0 0 4px rgba(238, 67, 67, 0.1);
    }

    /* Alert Messages */
    .alert-custom {
        border-radius: 16px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .alert-danger-custom {
        background: linear-gradient(135deg, #fef2f2, #fee2e2);
        border-left: 4px solid #ef4444;
        color: #991b1b;
    }

    .alert-danger-custom i {
        font-size: 1.25rem;
    }

    /* Button */
    .btn-login {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        border: none;
        border-radius: 40px;
        padding: 0.9rem 1.5rem;
        font-weight: 700;
        font-size: 1rem;
        color: white;
        width: 100%;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(238, 67, 67, 0.4);
    }

    /* Help Text */
    .help-text {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid #e2e8f0;
    }

    .help-text small {
        color: var(--gray);
        font-size: 0.75rem;
    }

    .help-text a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }

    .help-text a:hover {
        text-decoration: underline;
    }

    /* Back Link */
    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--gray);
        text-decoration: none;
        font-size: 0.85rem;
        margin-bottom: 1rem;
        transition: all 0.2s;
    }

    .back-link:hover {
        color: var(--primary);
    }

    @media (max-width: 576px) {
        .login-page {
            padding: 1rem;
        }
        
        .card-header-custom {
            padding: 1.5rem;
        }
        
        .card-header-custom img {
            max-width: 90px;
        }
        
        .card-body-custom {
            padding: 1.5rem;
        }
        
        .form-control-custom {
            padding: 0.75rem 1rem;
        }
    }
</style>

<div class="login-page">
    <div class="login-wrapper">
        <a href="{% url 'login.options' %}" class="back-link">
            <i class="fas fa-arrow-left"></i> Kembali
        </a>
        
        <div class="login-card">
            <div class="card-header-custom">
                <img class="mx-auto d-block" src="{% static 'img/logogabung.png' %}" alt="Logo">
                <h3>Login Akun Penghuni</h3>
                <p>Masukkan NIK dan password Anda</p>
            </div>
            
            <div class="card-body-custom">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert-custom alert-danger-custom">
                            <i class="fas fa-exclamation-circle"></i>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                {% endif %}
                
                <form method="POST" action="{% url 'login.send' %}">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label>
                            <i class="fas fa-id-card"></i> NIK / No Registrasi
                        </label>
                        <input type="number" 
                               class="form-control-custom" 
                               id="nik"
                               name="nik" 
                               value="{{ request.POST.nik }}"
                               placeholder="Masukkan NIK Anda"
                               required 
                               autofocus>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" 
                               class="form-control-custom" 
                               id="password"
                               name="password" 
                               placeholder="*********"
                               required>
                    </div>
                    
                    <button type="submit" class="btn-login">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

{% endblock %}
